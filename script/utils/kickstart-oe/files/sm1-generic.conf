# Config file for Amlogic SM1 based devices

# Minimyth2 stuff
IMAGE_BOOT_FILES += "minimyth.conf"

# Kernel stuff
IMAGE_BOOT_FILES += " \
Image \
dtbs/amlogic/*;dtbs/amlogic \
"
# Bootloader stuff
IMAGE_BOOT_FILES += " \
extlinux/extlinux.conf;extlinux/extlinux.conf \
sm1loaderfiles/*;bootloader \
"
